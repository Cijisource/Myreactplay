events {}

http {
    # Existing upstreams
    upstream client {
        server client:3002;
    }

    upstream api {
        server server:5002;
    }

    # New upstreams for second server
    upstream client_mansion {
        server frontend:3000;   # Example:  frontend
    }

    upstream api_mansion {
        server backend:5000;   # Example: mansion API
    }

    # First server block
    server {
        listen 90;
        server_name ecom.mansion.com;
        client_max_body_size 20M;

        location / {
            proxy_pass http://client;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://api/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 20M;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }

        location /uploads/ {
            proxy_pass http://api/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /health {
            access_log off;
            proxy_pass http://api/api/health;
        }
    }

    # Second server block with different upstreams
    server {
        listen 90;
        server_name admin.mansion.com;
        client_max_body_size 10M;

        location / {
            proxy_pass http://client_mansion;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://api_mansion/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://api_mansion/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /health {
            access_log off;
            proxy_pass http://api_mansion/api/health;
        }
    }
}