    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://mansion.gnanabi.info/api
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://mansion.gnanabi.info/api
    deploy:
      resources:
        limits:
          cpus: "0.1"      # Max 50% of a CPU per container
          memory: 125M     # Max 512 MB RAM per container
    networks:
      - mansion-network
    restart: unless-stopped

