services:
  backend:
    image: 555cijaiz555/rback:v7
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000"   # expose internally, not mapped to host
    environment:
      - DB_SERVER=gnanabi.database.windows.net
      - DB_PORT=1433
      - DB_DATABASE=mansion
      - DB_USER=servergnanaabi
      - DB_PASSWORD=serverpassword@123
      - EXPRESS_PORT=5000
      - NODE_ENV=production
    volumes:
      - ./mansion/photos/complains:/app/complains
      - ./mansion/photos/daily-status:/app/daily-status-media
      - ./mansion/photos/tenantphotos:/app/tenantphotos
      - ./mansion/photos/paymentreceipts:/app/paymentreceipts
      - ./mnasion/photos/banner:/app/banner
    deploy:
      replicas: 3   # Run 3 containers for the API service
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.2"      # Max 50% of a CPU per container
          memory: 125M     # Max 512 MB RAM per container
        reservations:
          cpus: "0.1"     # Reserve 25% of a CPU
          memory: 64M     # Reserve 256 MB RAM
    networks:
      - mansion-network
    restart: unless-stopped

