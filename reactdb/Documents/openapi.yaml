components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    OccupancyIdPath:
      name: occupancyId
      in: path
      required: true
      schema:
        type: integer
    DailyStatusIdPath:
      name: dailyStatusId
      in: path
      required: true
      schema:
        type: integer
    GuestCheckinIdPath:
      name: guestCheckinId
      in: path
      required: true
      schema:
        type: integer
    BillingYearPath:
      name: billingYear
      in: path
      required: true
      schema:
        type: integer
        example: 2026
    BillingMonthPath:
      name: billingMonth
      in: path
      required: true
      schema:
        type: integer
        example: 4
  responses:
    GenericSuccess:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LooseObject'
    ArrayResponse:
      description: Array response
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/LooseObject'
    ObjectResponse:
      description: Object response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LooseObject'
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    LooseObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      required: [error]
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
        user:
          type: object
          properties:
            id:
              type: integer
            username:
              type: string
            name:
              type: string
            roles:
              type: string
            nextLoginDuration:
              nullable: true
            lastLogin:
              nullable: true
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshTokenResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
    OccupancyCheckInRequest:
      type: object
      properties:
        tenantId:
          type: integer
        roomId:
          type: integer
        checkInDate:
          type: string
          format: date
      additionalProperties: true
    TenantRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        roomId:
          type: integer
        checkInDate:
          type: string
          format: date
        photoUrl:
          type: string
        proof1Url:
          type: string
      additionalProperties: true
    ComplaintRequest:
      type: object
      properties:
        occupancyId:
          type: integer
        complaintType:
          type: string
        description:
          type: string
        status:
          type: string
        proof1Url:
          type: string
        proof2Url:
          type: string
        videoUrl:
          type: string
      additionalProperties: true
    DailyStatusRequest:
      type: object
      properties:
        occupancyId:
          type: integer
        statusDate:
          type: string
          format: date
        notes:
          type: string
      additionalProperties: true
    GuestCheckinRequest:
      type: object
      properties:
        guestName:
          type: string
        relationship:
          type: string
        idProof:
          type: string
      additionalProperties: true
    ServiceDefinitionRequest:
      type: object
      properties:
        serviceName:
          type: string
        unitType:
          type: string
        unitCost:
          type: number
      additionalProperties: true
    ServicePaymentRequest:
      type: object
      properties:
        occupancyId:
          type: integer
        serviceId:
          type: integer
        amount:
          type: number
      additionalProperties: true
    ServiceAllocationRequest:
      type: object
      properties:
        occupancyId:
          type: integer
        serviceId:
          type: integer
      additionalProperties: true
    ServiceConsumptionRequest:
      type: object
      properties:
        serviceAllocId:
          type: integer
        currentReading:
          type: number
        readingDate:
          type: string
          format: date
      additionalProperties: true
    UserRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        name:
          type: string
      additionalProperties: true
    RoleRequest:
      type: object
      properties:
        roleName:
          type: string
        roleType:
          type: string
      additionalProperties: true
    UserRoleRequest:
      type: object
      properties:
        userId:
          type: integer
        roleId:
          type: integer
      required: [userId, roleId]
    TransactionRequest:
      type: object
      properties:
        transactionType:
          type: string
        amount:
          type: number
        date:
          type: string
          format: date
      additionalProperties: true
    StockRequest:
      type: object
      properties:
        itemName:
          type: string
        quantity:
          type: number
        price:
          type: number
      additionalProperties: true