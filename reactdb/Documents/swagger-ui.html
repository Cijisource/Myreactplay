<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoApp API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --panel: #fffdf9;
      --ink: #1e1a17;
      --accent: #a44c34;
      --accent-2: #2f6b5f;
      --border: #dbcdbf;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(164, 76, 52, 0.12), transparent 32%),
        radial-gradient(circle at top right, rgba(47, 107, 95, 0.12), transparent 28%),
        var(--bg);
      color: var(--ink);
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(255, 253, 249, 0.96), rgba(248, 240, 231, 0.96));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px 28px;
      box-shadow: 0 16px 40px rgba(60, 40, 28, 0.08);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 0;
      max-width: 820px;
      line-height: 1.5;
    }

    .hero code {
      font-family: Consolas, "Courier New", monospace;
      background: rgba(164, 76, 52, 0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }

    .note {
      margin-top: 14px;
      padding: 12px 14px;
      border-left: 4px solid var(--accent-2);
      background: rgba(47, 107, 95, 0.08);
      border-radius: 8px;
    }

    #swagger-ui {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(60, 40, 28, 0.08);
    }

    .swagger-ui .topbar {
      display: none;
    }

    .swagger-ui .information-container.wrapper {
      padding-top: 12px;
    }

    .swagger-ui .scheme-container {
      box-shadow: none;
      background: transparent;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      .page {
        padding: 12px;
      }

      .hero {
        padding: 18px;
      }

      .hero h1 {
        font-size: 1.55rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>PhotoApp Backend API</h1>
      <p>
        Interactive Swagger UI generated for the backend API documented in
        <code>Documents/openapi.yaml</code>.
      </p>
      <div class="note">
        If this page is opened directly as a local file and the browser blocks loading the YAML file,
        serve the repository root with a static server and then open this page over HTTP.
      </div>
    </section>
    <div id="swagger-ui"></div>
  </div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: './openapi.yaml',
      dom_id: '#swagger-ui',
      deepLinking: true,
      docExpansion: 'list',
      displayRequestDuration: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIStandalonePreset
      ],
      layout: 'BaseLayout'
    });
  </script>
</body>
</html>
