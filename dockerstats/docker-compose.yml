version: '3.8'

services:
  docker-stats:
    build: .
    container_name: docker-stats-collector
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker_stats_data:/app/docker_stats_data
    environment:
      - TZ=UTC
    # Optional: run periodically using a scheduler
    # Remove this and use external scheduling tool or cron if preferred
